<!DOCTYPE html>
<html>
<head>
  <title>DM Pro Status</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="Logo" width="24" height="24">
    <h2>DM Pro</h2>
  </div>
  
  <div class="status-container">
    <div id="status-indicator" class="dot disconnected"></div>
    <span id="status-text">Checking connection...</span>
  </div>

  <div class="content">
    <h3>Active Prefixes</h3>
    <ul id="prefix-list"></ul>
    
    <button id="add-site-btn" class="btn" disabled>Add Current Site</button>
    
    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 16px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 13px;">Catch All Downloads</span>
        <label class="switch">
          <input type="checkbox" id="catch-all-toggle">
          <span class="slider round"></span>
        </label>
      </div>
      <button id="catchCurrentBtn" style="width: 100%; padding: 8px; background: #6366f1; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
        Catch Current Download
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
